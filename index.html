<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Easter Challenge 🐣</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --mint:    #3DDBA8;
  --yellow:  #FFD23F;
  --coral:   #FF6B6B;
  --lavender:#B39DDB;
  --sky:     #4FC3F7;
  --peach:   #FFAB76;
  --lime:    #A8E063;
  --pink:    #F48FB1;
  --bg:      #FFF9F0;
  --card:    #FFFFFF;
  --dark:    #2D2D2D;
  --soft:    #6B6B6B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── FONDO ANIMADO ── */
.bg-bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;opacity:.12;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(110vh) scale(1);}100%{transform:translateY(-20vh) scale(1.2);}}

/* ── HEADER ── */
header{
  position:relative;z-index:2;
  background:linear-gradient(135deg,#FF6B6B,#FFD23F,#3DDBA8,#4FC3F7);
  background-size:300% 300%;
  animation:gradShift 6s ease infinite;
  padding:1.5rem 1rem 2rem;
  text-align:center;
  clip-path:ellipse(100% 85% at 50% 15%);
  padding-bottom:3rem;
}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.header-emoji{font-size:56px;display:block;animation:bounce 1.2s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-12px);}}
header h1{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2rem,6vw,3.2rem);
  color:#fff;
  text-shadow:3px 4px 0 rgba(0,0,0,.18);
  letter-spacing:1px;
  margin-top:.3rem;
}
header p{color:rgba(255,255,255,.9);font-size:1rem;font-weight:700;margin-top:.4rem;}

/* ── STATS BAR ── */
.stats-bar{
  position:relative;z-index:2;
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  margin:-1.2rem auto 1.5rem;
  padding:0 1rem;
  max-width:600px;
}
.stat-pill{
  background:#fff;
  border-radius:99px;
  padding:.5rem 1.2rem;
  display:flex;align-items:center;gap:.5rem;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  font-weight:800;font-size:.9rem;color:var(--dark);
}
.stat-pill span.ico{font-size:1.1rem;}
.stat-pill b{font-size:1.2rem;}

/* ── MAIN CONTENT ── */
main{position:relative;z-index:2;max-width:620px;margin:0 auto;padding:0 1rem 3rem;}

/* ── CANVAS PAPELITOS ── */
.canvas-wrap{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.1);
  border:4px dashed var(--yellow);
  margin-bottom:1.25rem;
  position:relative;
}
canvas{display:block;width:100%;height:180px;}
.canvas-label{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);
  border-radius:99px;padding:3px 14px;font-size:.75rem;font-weight:700;color:var(--soft);
  white-space:nowrap;
}

/* ── NÚMERO SORTEADO ── */
.sorteo-result{
  text-align:center;
  margin-bottom:1.2rem;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.big-num{
  font-family:'Fredoka One',cursive;
  font-size:96px;line-height:1;
  background:linear-gradient(135deg,var(--coral),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(2px 3px 0 rgba(255,107,107,.3));
}
.sorteo-sub{font-size:.85rem;color:var(--soft);font-weight:700;margin-top:.2rem;}

/* ── BOTONES ── */
.btn{
  font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;
  border:none;border-radius:99px;
  padding:.7rem 1.6rem;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  display:inline-flex;align-items:center;gap:.4rem;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.15);}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.btn-sortear{background:linear-gradient(135deg,var(--coral),var(--peach));color:#fff;}
.btn-ver   {background:linear-gradient(135deg,var(--mint),var(--sky));color:#fff;}
.btn-pasar {background:linear-gradient(135deg,var(--yellow),var(--peach));color:#fff;}
.btn-acepta{background:linear-gradient(135deg,var(--mint),var(--lime));color:#fff;}
.btn-iniciar{background:linear-gradient(135deg,var(--sky),var(--lavender));color:#fff;}
.btn-ok    {background:linear-gradient(135deg,#3DDBA8,#A8E063);color:#fff;}
.btn-fail  {background:linear-gradient(135deg,var(--coral),var(--pink));color:#fff;}
.btn-volver{background:linear-gradient(135deg,var(--lavender),var(--sky));color:#fff;}
.btn-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;}

/* ── CHIPS DE NÚMEROS ── */
.chips-section{margin:1.2rem 0;}
.chips-title{font-size:.8rem;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem;}
.chips-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:800;cursor:default;
  transition:transform .15s;
  border:3px solid transparent;
}
.chip-avail{background:linear-gradient(135deg,var(--mint),var(--sky));color:#fff;box-shadow:0 3px 8px rgba(61,219,168,.4);}
.chip-fila {background:linear-gradient(135deg,var(--yellow),var(--peach));color:#fff;box-shadow:0 3px 8px rgba(255,210,63,.4);cursor:pointer;}
.chip-fila:hover{transform:scale(1.15);}
.chip-used {background:#eee;color:#bbb;text-decoration:line-through;}

/* ── FILA ── */
.fila-section{
  background:#fff;border-radius:20px;padding:1rem 1.25rem;
  box-shadow:0 4px 16px rgba(0,0,0,.07);
  border-left:6px solid var(--yellow);
  margin-top:1rem;
}
.fila-section h3{font-size:.85rem;font-weight:800;color:var(--peach);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem;}
.fila-chips{display:flex;flex-wrap:wrap;gap:6px;}
.fila-chip-btn{
  background:linear-gradient(135deg,var(--yellow),var(--peach));
  color:#fff;border:none;border-radius:99px;
  padding:.3rem .9rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;
  cursor:pointer;transition:transform .12s;box-shadow:0 3px 8px rgba(255,171,118,.4);
}
.fila-chip-btn:hover{transform:scale(1.08);}

/* ── RETO CARD ── */
.reto-card{
  background:#fff;border-radius:24px;
  padding:1.5rem;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.1);
  margin-bottom:1.2rem;
  position:relative;overflow:hidden;
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
.reto-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,210,63,.08),rgba(61,219,168,.08));
  pointer-events:none;
}
.reto-num-tag{
  display:inline-block;
  background:linear-gradient(135deg,var(--coral),var(--peach));
  color:#fff;border-radius:99px;
  padding:.25rem .9rem;font-size:.8rem;font-weight:800;
  margin-bottom:.75rem;
}
.reto-emoji-big{font-size:52px;display:block;margin-bottom:.5rem;animation:wiggle 1s ease infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.reto-texto{
  font-size:1.05rem;font-weight:700;color:var(--dark);
  line-height:1.55;margin-bottom:.75rem;
}
.nivel-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  border-radius:99px;padding:.3rem .9rem;
  font-size:.8rem;font-weight:800;
}
.niv-0{background:#DCF9EC;color:#1B7A56;}
.niv-1{background:#FFF3CC;color:#9A6B00;}
.niv-2{background:#FFE0E0;color:#B02020;}

/* ── TIMER ── */
.timer-section{text-align:center;margin:1rem 0;}
.timer-ring-wrap{
  width:110px;height:110px;border-radius:50%;
  margin:0 auto .75rem;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.timer-ring-wrap svg{position:absolute;top:0;left:0;}
.timer-n{
  font-family:'Fredoka One',cursive;
  font-size:2.4rem;color:var(--dark);position:relative;z-index:2;
}

/* ── RESULTADO ── */
.result-banner{
  border-radius:20px;padding:1.1rem 1.5rem;
  text-align:center;font-size:1.05rem;font-weight:800;
  margin-bottom:1rem;animation:popIn .3s ease;
}
.rb-ok  {background:linear-gradient(135deg,#DCF9EC,#C8F0DA);color:#1B7A56;}
.rb-fail{background:linear-gradient(135deg,#FFE0E0,#FFD0D0);color:#B02020;}

/* ── PANTALLAS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── CONFETI ── */
.confeti{
  position:fixed;pointer-events:none;z-index:100;
  top:0;left:0;width:100%;height:100%;
}
</style>
</head>
<body>

<!-- Burbujas de fondo -->
<div class="bg-bubbles" id="bubbles"></div>

<!-- HEADER -->
<header>
  <span class="header-emoji">🐰</span>
  <h1>Easter Challenge</h1>
  <p>Complete your challenge and win your turn!</p>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-pill"><span class="ico">🥚</span>Disponibles: <b id="s-disp">21</b></div>
  <div class="stat-pill"><span class="ico">✅</span>Completados: <b id="s-comp">0</b></div>
  <div class="stat-pill"><span class="ico">⏳</span>En fila: <b id="s-fila">0</b></div>
</div>

<main>

  <!-- ══ PANTALLA SORTEO ══ -->
  <div class="screen active" id="scr-sorteo">

    <div class="canvas-wrap">
      <canvas id="cv" height="180"></canvas>
      <div class="canvas-label">✨ Los papelitos bailan esperando tu sorteo</div>
    </div>

    <div class="sorteo-result" id="sorteo-result" style="display:none;">
      <div class="big-num" id="big-num">1</div>
      <div class="sorteo-sub">¡Este número fue sorteado!</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-sortear" id="btn-sortear" onclick="sortear()">🎲 Sortear</button>
      <button class="btn btn-ver" id="btn-ver" onclick="verReto()" disabled>👀 Ver reto</button>
    </div>

    <div class="chips-section">
      <div class="chips-title">Números disponibles</div>
      <div class="chips-grid" id="chips-grid"></div>
    </div>

    <div class="fila-section" id="fila-section" style="display:none;">
      <h3>⏳ En la fila — toca para usar su turno</h3>
      <div class="fila-chips" id="fila-chips"></div>
    </div>

  </div><!-- /scr-sorteo -->

  <!-- ══ PANTALLA RETO ══ -->
  <div class="screen" id="scr-reto">

    <div class="reto-card">
      <div class="reto-num-tag" id="r-tag">Número 1</div>
      <span class="reto-emoji-big" id="r-emoji">🐣</span>
      <div class="reto-texto" id="r-texto"></div>
      <div class="nivel-badge" id="r-nivel"></div>
    </div>

    <div class="timer-section" id="timer-section">
      <div class="timer-ring-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="48" fill="none" stroke="#eee" stroke-width="8"/>
          <circle id="ring" cx="55" cy="55" r="48" fill="none" stroke="#3DDBA8" stroke-width="8"
            stroke-dasharray="301.6" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 55 55)" style="transition:stroke-dashoffset 1s linear,stroke .5s;"/>
        </svg>
        <span class="timer-n" id="timer-n">--</span>
      </div>
    </div>

    <div id="result-box" style="display:none;"></div>

    <!-- botones según estado -->
    <div class="btn-row" id="row-decision">
      <button class="btn btn-pasar" onclick="pasarFila()">⏳ A la fila</button>
      <button class="btn btn-acepta" onclick="aceptarReto()">💪 ¡Acepto!</button>
    </div>
    <div class="btn-row" id="row-iniciar" style="display:none;">
      <button class="btn btn-iniciar" onclick="iniciarTimer()">▶ Iniciar tiempo</button>
    </div>
    <div class="btn-row" id="row-resultado" style="display:none;">
      <button class="btn btn-ok" onclick="terminar(true)">🏆 Lo logró</button>
      <button class="btn btn-fail" onclick="terminar(false)">❌ No lo logró</button>
    </div>
    <div class="btn-row" id="row-volver" style="display:none;">
      <button class="btn btn-volver" onclick="volverSorteo()">🔄 Nuevo sorteo</button>
    </div>

  </div><!-- /scr-reto -->

</main>

<!-- canvas confeti oculto -->
<canvas class="confeti" id="confeti" style="display:none;"></canvas>

<script>
/* ─── DATOS ─── */
const RETOS=[
  {e:"🐔",t:"Cacarea como gallina durante 10 segundos sin reírte. Si te ríes, ¡empiezas de cero!",n:0,s:20},
  {e:"🐇",t:"Salta por el salón 15 segundos sin doblar rodillas. Solo saltos tiesos y ridículos.",n:0,s:20},
  {e:"🥚",t:"Carga un borrador en tu 'cuchara imaginaria' de un lado al otro. Si se cae, regresas.",n:0,s:25},
  {e:"🐥",t:"Imita a un pollito saliendo del cascarón por 10 segundos. El maestro decide si fue convincente.",n:0,s:20},
  {e:"🐑",t:"Bala como oveja con la boca cerrada 15 segundos. Más fuerte si no te escucho.",n:0,s:20},
  {e:"🕺",t:"Baila como si tuvieras un huevo de Pascua en cada axila y no puedas dejarlo caer.",n:0,s:25},
  {e:"🐰",t:"Salta en un pie 10 veces diciendo 'soy el conejo de Pascua' en cada salto.",n:0,s:30},
  {e:"🤸",t:"Camina en cuclillas de un extremo al otro sin levantarte ni una sola vez.",n:1,s:30},
  {e:"🌀",t:"Gira 8 veces seguidas y luego camina recto hasta tocar la pared. El mareo es OBLIGATORIO.",n:1,s:35},
  {e:"🦆",t:"Camina como pato en cuclillas, con alas, graznando 5 veces. Muy serio, por favor.",n:1,s:30},
  {e:"🧊",t:"Mantén la posición de plancha (lagartija estática) todo el tiempo. Sin caer las caderas.",n:1,s:30},
  {e:"🎭",t:"Actúa que estás rompiendo un huevo gigante desde adentro. Sin palabras, solo movimientos.",n:1,s:30},
  {e:"🐸",t:"Salta como rana 5 veces en cuclillas profundas y crocea fuerte en cada uno.",n:1,s:35},
  {e:"🤡",t:"Di el abecedario completo mientras haces sentadillas. Una letra por cada sentadilla.",n:1,s:40},
  {e:"🏋️",t:"Haz 8 lagartijas completas y al terminar grita: '¡SOY EL HUEVO MÁS FUERTE DEL SALÓN!'",n:2,s:40},
  {e:"🎪",t:"Toca rodilla derecha con codo izquierdo y viceversa, alternando 10 veces. ¡Rápido!",n:2,s:35},
  {e:"🤹",t:"Equilibrio en un pie con ojos cerrados 20 segundos. Si tocas el suelo, empiezas de cero.",n:2,s:45},
  {e:"🐍",t:"Arrastra todo el salón boca abajo sin usar rodillas, solo con los brazos. Como serpiente.",n:2,s:45},
  {e:"🎯",t:"Salta en un pie hacia atrás sin voltear esquivando objetos que yo ponga en el camino.",n:2,s:40},
  {e:"🦩",t:"Pose de flamenco (un pie arriba, brazos de ala) mientras respondes 3 preguntas mías.",n:2,s:45},
  {e:"🥊",t:"5 lagartijas + 5 saltos de rana + 10 segundos en un pie. Sin descanso entre partes.",n:2,s:50},
];
const NOMS=["🐣 Pollito","🐰 Conejo","🥚 Huevo Dorado"];
const NCLASES=["niv-0","niv-1","niv-2"];

let disponibles=[...Array(21)].map((_,i)=>i+1);
let fila=[];
let usados=[];
let actual=null;
let timerInt=null,timeLeft=0,totalSec=0;

/* ─── BURBUJAS DE FONDO ─── */
(()=>{
  const wrap=document.getElementById('bubbles');
  const cols=['#FF6B6B','#FFD23F','#3DDBA8','#4FC3F7','#B39DDB','#FFAB76','#A8E063','#F48FB1'];
  for(let i=0;i<18;i++){
    const b=document.createElement('div');
    const s=40+Math.random()*120;
    b.className='bubble';
    b.style.cssText=`
      width:${s}px;height:${s}px;
      background:${cols[i%cols.length]};
      left:${Math.random()*100}%;
      animation-duration:${8+Math.random()*14}s;
      animation-delay:${-Math.random()*15}s;
    `;
    wrap.appendChild(b);
  }
})();

/* ─── CANVAS PAPELITOS ─── */
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H,papers=[];
let animId=null,sorteando=false;

const PCOLS=['#FF6B6B','#FFD23F','#3DDBA8','#4FC3F7','#B39DDB','#FFAB76','#A8E063','#F48FB1'];

function resizeCanvas(){
  W=cv.parentElement.offsetWidth;H=180;
  cv.width=W;cv.height=H;
}

function makePaper(fromCenter){
  const pool=disponibles.length?disponibles:[...Array(21)].map((_,i)=>i+1);
  return{
    x:fromCenter?W/2+(Math.random()-.5)*60:Math.random()*W,
    y:fromCenter?H+10:Math.random()*H,
    w:32+Math.random()*18,h:20+Math.random()*10,
    col:PCOLS[Math.floor(Math.random()*PCOLS.length)],
    vx:(Math.random()-.5)*2,
    vy:fromCenter?-(3+Math.random()*5):(Math.random()-.5)*1.5,
    angle:Math.random()*Math.PI*2,
    va:(Math.random()-.5)*.06,
    num:pool[Math.floor(Math.random()*pool.length)],
    alpha:1,fade:false,
  };
}

function initPapers(){
  papers=[];
  for(let i=0;i<28;i++) papers.push(makePaper(false));
}

function drawPapers(){
  ctx.clearRect(0,0,W,H);
  papers.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle=p.col;
    ctx.beginPath();
    ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,4);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.font=`bold ${Math.round(p.h*.68)}px Nunito,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.num,0,0);
    ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;
    if(p.fade)p.alpha-=.04;
    if(p.x<-50)p.x=W+50;
    if(p.x>W+50)p.x=-50;
    if(p.y<-50)p.y=H+50;
    if(p.y>H+50)p.y=-50;
  });
}

function loopIdle(){
  drawPapers();
  animId=requestAnimationFrame(loopIdle);
}
function stopLoop(){if(animId){cancelAnimationFrame(animId);animId=null;}}
function startIdle(){stopLoop();animId=requestAnimationFrame(loopIdle);}

/* ─── SORTEO ─── */
function sortear(){
  const pool=[...disponibles,...fila];
  if(!pool.length){alert('¡Ya no hay números disponibles!');return;}
  document.getElementById('btn-sortear').disabled=true;
  document.getElementById('btn-ver').disabled=true;
  document.getElementById('sorteo-result').style.display='none';
  stopLoop();
  papers=[];
  for(let i=0;i<38;i++) papers.push(makePaper(true));
  const picked=pool[Math.floor(Math.random()*pool.length)];
  let t=0;
  function loop(){
    drawPapers();
    t++;
    papers.forEach(p=>{p.vy*=.984;p.vx*=.984;});
    if(t>55){
      papers.forEach(p=>{
        if(p.num!==picked){p.fade=true;}
        else{const dx=p.x-W/2,dy=p.y-H/2,d=Math.sqrt(dx*dx+dy*dy)||1;p.vx=-dx/d*2.5;p.vy=-dy/d*2.5;}
      });
    }
    if(t<115){requestAnimationFrame(loop);}
    else{
      actual=picked;
      document.getElementById('big-num').textContent=picked;
      document.getElementById('sorteo-result').style.display='block';
      document.getElementById('btn-ver').disabled=false;
      document.getElementById('btn-sortear').disabled=false;
      startIdle();
    }
  }
  requestAnimationFrame(loop);
}

/* ─── VER RETO ─── */
function verReto(){
  if(actual===null)return;
  const r=RETOS[actual-1];
  document.getElementById('r-tag').textContent='Número '+actual;
  document.getElementById('r-emoji').textContent=r.e;
  document.getElementById('r-texto').textContent=r.t;
  const nb=document.getElementById('r-nivel');
  nb.textContent=NOMS[r.n];
  nb.className='nivel-badge '+NCLASES[r.n];
  totalSec=r.s;timeLeft=r.s;
  document.getElementById('timer-n').textContent=r.s;
  setRing(1);
  document.getElementById('result-box').style.display='none';
  showRow('row-decision');
  showScreen('scr-reto');
}

function pasarFila(){
  if(actual===null)return;
  if(!fila.includes(actual))fila.push(actual);
  disponibles=disponibles.filter(n=>n!==actual);
  actual=null;
  document.getElementById('sorteo-result').style.display='none';
  actualizarStats();
  showScreen('scr-sorteo');
}

function aceptarReto(){showRow('row-iniciar');}

function iniciarTimer(){
  showRow('none');
  stopTimer();
  timerInt=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer-n').textContent=timeLeft;
    setRing(timeLeft/totalSec);
    if(timeLeft<=0){
      stopTimer();
      document.getElementById('timer-n').textContent='0';
      showRow('row-resultado');
    }
  },1000);
}

function terminar(ok){
  stopTimer();
  disponibles=disponibles.filter(n=>n!==actual);
  fila=fila.filter(n=>n!==actual);
  usados.push(actual);
  actual=null;
  actualizarStats();
  const box=document.getElementById('result-box');
  box.style.display='block';
  box.className='result-banner '+(ok?'rb-ok':'rb-fail');
  box.textContent=ok?'🏆 ¡Lo logró! Puede elegir su huevo de Pascua.':'❌ No lo logró. El turno pasa a otro alumno.';
  if(ok)lanzarConfeti();
  showRow('row-volver');
}

function volverSorteo(){
  stopTimer();
  document.getElementById('sorteo-result').style.display='none';
  showScreen('scr-sorteo');
  startIdle();
}

/* ─── HELPERS ─── */
function setRing(f){
  const circ=301.6;
  document.getElementById('ring').style.strokeDashoffset=circ*(1-f);
  document.getElementById('ring').style.stroke=f>.5?'#3DDBA8':f>.25?'#FFD23F':'#FF6B6B';
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showRow(id){
  ['row-decision','row-iniciar','row-resultado','row-volver'].forEach(r=>{
    document.getElementById(r).style.display=(r===id)?'flex':'none';
  });
}

function actualizarStats(){
  document.getElementById('s-disp').textContent=disponibles.length;
  document.getElementById('s-comp').textContent=usados.length;
  document.getElementById('s-fila').textContent=fila.length;
  renderChips();
  renderFila();
}

function renderChips(){
  const g=document.getElementById('chips-grid');
  g.innerHTML='';
  for(let i=1;i<=21;i++){
    const d=document.createElement('div');
    d.className='chip '+(usados.includes(i)?'chip-used':fila.includes(i)?'chip-fila':'chip-avail');
    d.textContent=i;
    if(fila.includes(i)){
      d.title='En fila — toca para elegir';
      d.onclick=()=>{actual=i;document.getElementById('big-num').textContent=i;document.getElementById('sorteo-result').style.display='block';document.getElementById('btn-ver').disabled=false;};
    }
    g.appendChild(d);
  }
}

function renderFila(){
  const fs=document.getElementById('fila-section');
  const fc=document.getElementById('fila-chips');
  if(!fila.length){fs.style.display='none';return;}
  fs.style.display='block';
  fc.innerHTML='';
  fila.forEach(n=>{
    const b=document.createElement('button');
    b.className='fila-chip-btn';
    b.textContent='#'+n;
    b.onclick=()=>{actual=n;document.getElementById('big-num').textContent=n;document.getElementById('sorteo-result').style.display='block';document.getElementById('btn-ver').disabled=false;};
    fc.appendChild(b);
  });
}

/* ─── CONFETI ─── */
function lanzarConfeti(){
  const cv2=document.getElementById('confeti');
  cv2.style.display='block';
  cv2.width=window.innerWidth;cv2.height=window.innerHeight;
  const ctx2=cv2.getContext('2d');
  const bits=[];
  for(let i=0;i<120;i++) bits.push({
    x:Math.random()*cv2.width,y:-10,
    vx:(Math.random()-.5)*6,vy:2+Math.random()*5,
    col:PCOLS[Math.floor(Math.random()*PCOLS.length)],
    w:8+Math.random()*8,h:5+Math.random()*5,
    angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2,
    alpha:1,
  });
  let fr=0;
  function loop(){
    ctx2.clearRect(0,0,cv2.width,cv2.height);
    bits.forEach(b=>{
      ctx2.save();ctx2.globalAlpha=b.alpha;
      ctx2.translate(b.x,b.y);ctx2.rotate(b.angle);
      ctx2.fillStyle=b.col;
      ctx2.fillRect(-b.w/2,-b.h/2,b.w,b.h);
      ctx2.restore();
      b.x+=b.vx;b.y+=b.vy;b.vy+=.08;b.angle+=b.va;
      if(fr>60)b.alpha-=.015;
    });
    fr++;
    if(fr<130)requestAnimationFrame(loop);
    else cv2.style.display='none';
  }
  requestAnimationFrame(loop);
}

/* ─── INIT ─── */
window.addEventListener('load',()=>{
  resizeCanvas();
  initPapers();
  renderChips();
  startIdle();
});
window.addEventListener('resize',()=>{resizeCanvas();initPapers();});
</script>
